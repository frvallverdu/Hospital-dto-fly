spring.application.name=Hospital_vm

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/db_hospital_vm?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=

# JPA - Flyway administra el esquema y Hibernate solo valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
